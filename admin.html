<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — Enterprise Management Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0f172a;color:#f1f5f9;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
    .card{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:1.5rem;}
    .field{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:.625rem;padding:.625rem 1rem;color:#f1f5f9;font-size:.875rem;outline:none;}
    .field:focus{border-color:#6366f1;}
    .btn{padding:.625rem 1rem;border-radius:.625rem;border:none;cursor:pointer;font-size:.8125rem;font-weight:600;transition:all .15s;}
    .btn-primary{background:#4f46e5;color:white;}.btn-primary:hover{background:#4338ca;}
    .btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}
    .btn-danger:hover{background:rgba(239,68,68,.25);}
    .btn-success{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
    .btn-success:hover{background:rgba(34,197,94,.25);}
    .btn-sm{padding:4px 10px;font-size:.75rem;}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:.6875rem;font-weight:700;}
    .badge-green{background:rgba(34,197,94,.15);color:#4ade80;}
    .badge-red{background:rgba(239,68,68,.15);color:#f87171;}
    .badge-yellow{background:rgba(245,158,11,.15);color:#fbbf24;}
    .badge-blue{background:rgba(99,102,241,.15);color:#a5b4fc;}
    table{width:100%;border-collapse:collapse;font-size:.8125rem;}
    th{background:#0f172a;padding:8px 12px;text-align:left;color:#64748b;font-weight:600;font-size:.6875rem;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #334155;}
    td{padding:8px 12px;border-bottom:1px solid #1e293b;vertical-align:middle;}
    tr:hover td{background:rgba(51,65,85,.3);}
    .tab-btn{padding:6px 14px;border-radius:7px;font-size:.8125rem;cursor:pointer;border:none;background:transparent;color:#64748b;transition:all .15s;}
    .tab-btn.active{background:rgba(99,102,241,.18);color:#a5b4fc;}
    .tab-btn:hover:not(.active){color:#f1f5f9;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:#1e293b;border:1px solid #334155;border-radius:1rem;padding:1.5rem;max-width:500px;width:100%;max-height:85vh;overflow-y:auto;}
    ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .65s linear infinite;}
    .notification-dot{width:8px;height:8px;background:#f87171;border-radius:50%;display:inline-block;}
  </style>
</head>
<body>

<!-- ═══ ÉCRAN CONNEXION ═══════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="card" style="max-width:360px;width:100%;">
    <div style="text-align:center;margin-bottom:1.25rem;">
      <div style="font-size:2rem;margin-bottom:.5rem;">🛡️</div>
      <h1 style="font-size:1.125rem;font-weight:700;">Super Admin</h1>
      <p style="color:#64748b;font-size:.75rem;margin-top:.25rem;">Enterprise Management Pro</p>
    </div>
    <div id="login-err" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:.5rem;padding:.5rem .75rem;font-size:.8rem;margin-bottom:.75rem;"></div>
    <div style="margin-bottom:.625rem;">
      <input id="admin-pwd" type="password" placeholder="Mot de passe super-admin" class="field">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="adminLogin()">Accéder</button>
  </div>
</div>

<!-- ═══ INTERFACE ADMIN ═══════════════════════════════════════════════════ -->
<div id="admin-app" style="display:none;">

  <!-- Topbar -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:50;">
    <span style="font-size:1.125rem;">🛡️</span>
    <span style="font-weight:700;font-size:.9375rem;">Super Admin</span>
    <div style="flex:1;"></div>
    <div id="notif-btn" style="position:relative;cursor:pointer;" onclick="ADMIN.showTab('requests')">
      <div style="background:rgba(51,65,85,.5);border:1px solid #334155;border-radius:.5rem;padding:5px 10px;font-size:.75rem;color:#94a3b8;display:flex;align-items:center;gap:.375rem;">
        🔔 Demandes
        <span id="notif-count" class="badge badge-red" style="display:none;"></span>
      </div>
    </div>
    <button onclick="adminLogout()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:.75rem;">Déconnexion</button>
  </div>

  <!-- Tabs -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:.375rem 1rem;display:flex;gap:.25rem;overflow-x:auto;">
    <button class="tab-btn active" data-tab="dashboard" onclick="ADMIN.showTab('dashboard')">📊 Tableau de bord</button>
    <button class="tab-btn" data-tab="enterprises" onclick="ADMIN.showTab('enterprises')">🏢 Entreprises</button>
    <button class="tab-btn" data-tab="requests" onclick="ADMIN.showTab('requests')">💳 Demandes</button>
    <button class="tab-btn" data-tab="revenue" onclick="ADMIN.showTab('revenue')">💰 Revenus</button>
  </div>

  <!-- Contenu -->
  <div id="admin-content" style="padding:1.25rem;max-width:1200px;margin:0 auto;"></div>

</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
'use strict';

// ─── Config Firebase ─────────────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAcZPCtajiuZxrDMM0CelNPRdXD-tanBxU",
  databaseURL: "https://enterprisemanagementpro-default-rtdb.firebaseio.com",
  projectId: "enterprisemanagementpro",
  appId: "1:932509312427:web:6aacfe4743315c69581eee"
};

// Mot de passe super-admin (hashé)
const ADMIN_HASH = 'h' + Math.abs(
  'admin_emp_2025'.split('').reduce((h,c) => Math.imul(31,h) + c.charCodeAt(0)|0, 0)
).toString(16);

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31,h) + s.charCodeAt(i)|0;
  return 'h' + Math.abs(h).toString(16);
}

let _db = null;

function getDB() {
  if (!_db) {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database();
  }
  return _db;
}

// ─── Login ───────────────────────────────────────────────────────────────────
function adminLogin() {
  const pwd = document.getElementById('admin-pwd').value;
  if (hashStr(pwd) !== ADMIN_HASH && pwd !== 'admin_emp_2025') {
    document.getElementById('login-err').textContent = 'Mot de passe incorrect';
    document.getElementById('login-err').style.display = 'block';
    return;
  }
  sessionStorage.setItem('admin_auth', '1');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'block';
  ADMIN.init();
}

function adminLogout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

document.getElementById('admin-pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

if (sessionStorage.getItem('admin_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'block';
  document.addEventListener('DOMContentLoaded', () => ADMIN.init());
}

// ─── Utilitaires ─────────────────────────────────────────────────────────────
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fDate = s => s ? new Date(s).toLocaleDateString('fr-FR') : '—';
const fCur = n => (n||0).toLocaleString() + ' Ar';

function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal-box">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function loading(msg = 'Chargement...') {
  document.getElementById('admin-content').innerHTML = `
    <div style="text-align:center;padding:3rem;color:#64748b;">
      <svg style="width:24px;height:24px;display:inline-block;" class="spin" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="#334155" stroke-width="3"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div style="margin-top:.5rem;font-size:.875rem;">${msg}</div>
    </div>`;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

// ─── ADMIN Controller ─────────────────────────────────────────────────────────
window.ADMIN = {
  _tab: 'dashboard',
  _enterprises: null,
  _requests: null,

  async init() {
    await this.loadData();
    this.showTab('dashboard');
    this.pollRequests();
  },

  async loadData() {
    const db = getDB();
    // Charger en parallèle
    const [entSnap, reqSnap] = await Promise.all([
      db.ref('entreprises').once('value'),
      db.ref('payment_requests').once('value')
    ]);

    this._enterprises = [];
    entSnap.forEach(child => {
      const data = child.val();
      if (data) this._enterprises.push({ id: child.key, ...data });
    });

    this._requests = [];
    reqSnap.forEach(child => {
      this._requests.push({ key: child.key, ...child.val() });
    });
    this._requests.sort((a,b) => b.submittedAt > a.submittedAt ? 1 : -1);

    // Badge notification
    const pending = this._requests.filter(r => r.status === 'pending').length;
    const notif = document.getElementById('notif-count');
    if (pending > 0) {
      notif.textContent = pending; notif.style.display = 'inline-flex';
    } else {
      notif.style.display = 'none';
    }
  },

  showTab(tab) {
    this._tab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    if (tab === 'dashboard') this.renderDashboard();
    else if (tab === 'enterprises') this.renderEnterprises();
    else if (tab === 'requests') this.renderRequests();
    else if (tab === 'revenue') this.renderRevenue();
  },

  // ─── Dashboard ─────────────────────────────────────────────────────────────
  renderDashboard() {
    const ents = this._enterprises || [];
    const reqs = this._requests || [];
    const now = new Date();

    const active  = ents.filter(e => !this._isExpired(e)).length;
    const expired = ents.filter(e => this._isExpired(e)).length;
    const inactive30 = ents.filter(e => {
      const last = e.config?.updatedAt || e.config?.createdAt;
      if (!last) return false;
      return (now - new Date(last)) > 30 * 86400000;
    }).length;
    const pending = reqs.filter(r => r.status === 'pending').length;

    const planCount = {};
    ents.forEach(e => {
      const p = e.subscription?.plan || '?';
      planCount[p] = (planCount[p]||0) + 1;
    });

    const recentReqs = reqs.slice(0, 5);

    document.getElementById('admin-content').innerHTML = `
      <!-- KPIs -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem;">
        ${[
          ['🏢', 'Entreprises', ents.length, '#a5b4fc'],
          ['✅', 'Actives', active, '#4ade80'],
          ['⛔', 'Expirées', expired, '#f87171'],
          ['😴', 'Inactives 30j', inactive30, '#fbbf24'],
          ['⏳', 'Demandes en attente', pending, '#fb923c'],
        ].map(([icon, label, val, color]) => `
          <div style="background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:.875rem;">
            <div style="font-size:1.375rem;margin-bottom:.375rem;">${icon}</div>
            <div style="font-size:1.5rem;font-weight:800;color:${color};">${val}</div>
            <div style="font-size:.6875rem;color:#64748b;">${label}</div>
          </div>`).join('')}
      </div>

      <!-- Plans -->
      <div style="background:#1e293b;border:1px solid #334155;border-radius:.875rem;padding:1rem;margin-bottom:1rem;">
        <h3 style="font-size:.875rem;font-weight:700;margin-bottom:.75rem;">Répartition des plans</h3>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;">
          ${Object.entries(planCount).map(([p,n]) => `
            <div style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.25);border-radius:.75rem;padding:.5rem .875rem;">
              <span style="color:#a5b4fc;font-weight:700;">${p}</span>
              <span style="color:#64748b;font-size:.75rem;margin-left:.375rem;">${n} entreprise(s)</span>
            </div>`).join('')}
        </div>
      </div>

      <!-- Dernières demandes -->
      <div style="background:#1e293b;border:1px solid #334155;border-radius:.875rem;padding:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
          <h3 style="font-size:.875rem;font-weight:700;">Dernières demandes</h3>
          <button class="btn btn-primary btn-sm" onclick="ADMIN.showTab('requests')">Voir tout</button>
        </div>
        ${recentReqs.length === 0 ? '<div style="color:#64748b;font-size:.875rem;">Aucune demande</div>' :
          recentReqs.map(r => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #1e293b;">
            <div>
              <div style="font-size:.8125rem;font-weight:600;">${esc(r.enterpriseName||r.enterpriseId)}</div>
              <div style="font-size:.6875rem;color:#64748b;">${r.plan} · ${fCur(r.amount)} · ${r.operator}</div>
            </div>
            <span class="badge ${r.status==='pending'?'badge-yellow':r.status==='approved'?'badge-green':'badge-red'}">
              ${r.status==='pending'?'En attente':r.status==='approved'?'Approuvé':'Refusé'}
            </span>
          </div>`).join('')}
      </div>`;
  },

  // ─── Entreprises ────────────────────────────────────────────────────────────
  renderEnterprises(filter = '') {
    const ents = (this._enterprises||[]).filter(e =>
      !filter || e.id.includes(filter) || (e.config?.name||'').toLowerCase().includes(filter.toLowerCase())
    );

    document.getElementById('admin-content').innerHTML = `
      <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;">
        <input id="ent-search" type="text" placeholder="Rechercher..." class="field" style="max-width:240px;"
          oninput="ADMIN.renderEnterprises(this.value)" value="${esc(filter)}">
        <button class="btn btn-primary btn-sm" onclick="ADMIN.showCreateEnterprise()">+ Créer</button>
        <button class="btn btn-sm" style="background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;" onclick="ADMIN.loadData().then(()=>ADMIN.renderEnterprises())">↻ Rafraîchir</button>
      </div>
      <div style="background:#1e293b;border:1px solid #334155;border-radius:.875rem;overflow:hidden;">
        <table>
          <thead><tr>
            <th>ID / Nom</th><th>Plan</th><th>Expiration</th><th>Statut</th><th>Créé le</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${ents.map(e => {
              const sub = e.subscription || {};
              const expired = this._isExpired(e);
              const days = daysUntil(sub.paidUntil || sub.expiresAt);
              const plan = sub.plan || '?';
              return `
              <tr>
                <td>
                  <div style="font-weight:700;font-size:.8125rem;">${esc(e.id)}</div>
                  <div style="color:#64748b;font-size:.6875rem;">${esc(e.config?.name||'')}</div>
                </td>
                <td><span class="badge ${plan==='PREMIUM'?'badge-blue':plan==='LOCAL'?'badge-yellow':'badge-green'}">${plan}</span></td>
                <td style="font-size:.75rem;color:${expired?'#f87171':days!==null&&days<=7?'#fbbf24':'#94a3b8'};">
                  ${plan==='LOCAL' ? '∞ Perpétuel' : fDate(sub.paidUntil||sub.expiresAt)}
                  ${!expired && days !== null && plan !== 'LOCAL' ? `<br><span style="font-size:.625rem;">${days}j restants</span>` : ''}
                </td>
                <td><span class="badge ${expired?'badge-red':'badge-green'}">${expired?'Expiré':'Actif'}</span></td>
                <td style="font-size:.75rem;color:#64748b;">${fDate(e.config?.createdAt)}</td>
                <td>
                  <div style="display:flex;gap:.25rem;flex-wrap:wrap;">
                    <button class="btn btn-sm" style="background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.25);" onclick="ADMIN.showEnterpriseDetail('${esc(e.id)}')">Détails</button>
                    <button class="btn btn-sm btn-success" onclick="ADMIN.showExtendSub('${esc(e.id)}')">+30j</button>
                    <button class="btn btn-sm btn-danger" onclick="ADMIN.deleteEnterprise('${esc(e.id)}')">Suppr.</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        ${ents.length === 0 ? '<div style="padding:2rem;text-align:center;color:#64748b;">Aucune entreprise trouvée</div>' : ''}
      </div>`;
  },

  _isExpired(e) {
    const sub = e.subscription || {};
    if (!sub.plan || sub.plan === 'LOCAL') return false;
    const exp = sub.paidUntil || sub.expiresAt;
    if (!exp) return false;
    return new Date(exp) < new Date();
  },

  async showEnterpriseDetail(entId) {
    const e = this._enterprises.find(x => x.id === entId);
    if (!e) return;
    const sub = e.subscription || {};
    const cfg = e.config || {};
    const postes = Array.isArray(cfg.postes) ? cfg.postes :
      cfg.postes ? Object.values(cfg.postes).filter(Boolean) : [];

    showModal(`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h3 style="font-weight:700;">${esc(cfg.name||entId)}</h3>
        <button onclick="closeModal()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:1.25rem;">×</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1rem;font-size:.8125rem;">
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">ID</div><div>${esc(entId)}</div></div>
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">Plan</div><div>${sub.plan||'?'}</div></div>
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">Expiration</div><div>${sub.plan==='LOCAL'?'Perpétuel':fDate(sub.paidUntil||sub.expiresAt)}</div></div>
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">Créé le</div><div>${fDate(cfg.createdAt)}</div></div>
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">Tél</div><div>${esc(cfg.phone||'—')}</div></div>
        <div style="background:#0f172a;border-radius:.5rem;padding:.5rem .75rem;"><div style="color:#64748b;font-size:.6875rem;">Multiposte</div><div>${cfg.multiposte?'Activé':'Désactivé'}</div></div>
      </div>
      ${postes.length > 0 ? `
      <div style="margin-bottom:1rem;">
        <div style="font-size:.75rem;font-weight:700;color:#94a3b8;margin-bottom:.375rem;">POSTES (${postes.length})</div>
        ${postes.map(p => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.4rem .75rem;background:#0f172a;border-radius:.5rem;margin-bottom:.25rem;font-size:.8125rem;">
            <span>${esc(p.name)}</span>
            <div style="display:flex;gap:.25rem;">
              ${p.passwordHash ? '<span style="color:#fbbf24;font-size:.6875rem;">🔒</span>' : ''}
              <button class="btn btn-sm" style="background:rgba(99,102,241,.15);color:#a5b4fc;border:none;" onclick="ADMIN.resetPostePassword('${esc(entId)}','${esc(p.id)}','${esc(p.name)}')">Reset mdp</button>
            </div>
          </div>`).join('')}
      </div>` : ''}
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <button class="btn btn-sm btn-success" onclick="closeModal();ADMIN.showExtendSub('${esc(entId)}')">Prolonger abonnement</button>
        <button class="btn btn-sm btn-primary" onclick="ADMIN.editExpiry('${esc(entId)}')">Modifier date fin</button>
        <button class="btn btn-sm" style="background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.3);" onclick="ADMIN.exportEnterprise('${esc(entId)}')">Export DB</button>
        <button class="btn btn-sm btn-danger" onclick="closeModal();ADMIN.deleteEnterprise('${esc(entId)}')">Supprimer</button>
      </div>
    `);
  },

  async showExtendSub(entId) {
    const e = this._enterprises.find(x => x.id === entId);
    const sub = e?.subscription || {};
    const curExp = sub.paidUntil || sub.expiresAt;
    const curDate = curExp && new Date(curExp) > new Date() ? curExp : new Date().toISOString();

    showModal(`
      <h3 style="font-weight:700;margin-bottom:1rem;">➕ Prolonger — ${esc(e?.config?.name||entId)}</h3>
      <div style="margin-bottom:.75rem;font-size:.8125rem;color:#94a3b8;">
        Date actuelle d'expiration : <strong style="color:#f1f5f9;">${sub.plan==='LOCAL'?'Perpétuel':fDate(curExp)}</strong>
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block;font-size:.6875rem;color:#94a3b8;margin-bottom:.3rem;">Jours à ajouter</label>
        <select id="ext-days" class="field">
          <option value="30">+30 jours (1 mois)</option>
          <option value="60">+60 jours (2 mois)</option>
          <option value="90">+90 jours (3 mois)</option>
          <option value="365">+365 jours (1 an)</option>
        </select>
      </div>
      <div style="margin-bottom:.875rem;">
        <label style="display:block;font-size:.6875rem;color:#94a3b8;margin-bottom:.3rem;">Plan (optionnel)</label>
        <select id="ext-plan" class="field">
          <option value="">Conserver actuel (${sub.plan||'?'})</option>
          <option value="BASIC">Basic</option>
          <option value="PREMIUM">Premium</option>
          <option value="LOCAL">Local</option>
        </select>
      </div>
      <div style="display:flex;gap:.5rem;">
        <button onclick="closeModal()" class="btn btn-sm" style="flex:1;background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;">Annuler</button>
        <button onclick="ADMIN.applyExtend('${esc(entId)}')" class="btn btn-primary btn-sm" style="flex:2;">Confirmer</button>
      </div>
    `);
  },

  async applyExtend(entId) {
    const days = parseInt(document.getElementById('ext-days').value);
    const plan = document.getElementById('ext-plan').value;
    const e = this._enterprises.find(x => x.id === entId);
    const sub = e?.subscription || {};
    const curExp = sub.paidUntil || sub.expiresAt;

    const base = curExp && new Date(curExp) > new Date() ? new Date(curExp) : new Date();
    base.setDate(base.getDate() + days);
    const newExpiry = base.toISOString();

    const update = {
      paidUntil: newExpiry,
      expiresAt: newExpiry,
      status: 'active',
    };
    if (plan) update.plan = plan;

    await getDB().ref(`entreprises/${entId}/subscription`).update(update);
    closeModal();
    showToast(`✅ Abonnement prolongé jusqu'au ${fDate(newExpiry)}`, 'success');
    await this.loadData();
    this.renderEnterprises();
  },

  async editExpiry(entId) {
    const e = this._enterprises.find(x => x.id === entId);
    const sub = e?.subscription || {};
    const curExp = sub.paidUntil || sub.expiresAt || new Date().toISOString();

    showModal(`
      <h3 style="font-weight:700;margin-bottom:1rem;">📅 Modifier date fin — ${esc(e?.config?.name||entId)}</h3>
      <div style="margin-bottom:.875rem;">
        <label style="display:block;font-size:.6875rem;color:#94a3b8;margin-bottom:.3rem;">Nouvelle date d'expiration</label>
        <input id="edit-exp-date" type="date" class="field" value="${curExp.split('T')[0]}">
      </div>
      <div style="display:flex;gap:.5rem;">
        <button onclick="closeModal()" class="btn btn-sm" style="flex:1;background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;">Annuler</button>
        <button onclick="ADMIN.applyEditExpiry('${esc(entId)}')" class="btn btn-primary btn-sm" style="flex:2;">Sauvegarder</button>
      </div>
    `);
  },

  async applyEditExpiry(entId) {
    const dateVal = document.getElementById('edit-exp-date').value;
    if (!dateVal) return;
    const newExp = new Date(dateVal + 'T23:59:59').toISOString();
    await getDB().ref(`entreprises/${entId}/subscription`).update({
      paidUntil: newExp, expiresAt: newExp, status: 'active'
    });
    closeModal();
    showToast('✅ Date d\'expiration modifiée', 'success');
    await this.loadData();
    this.renderEnterprises();
  },

  async resetPostePassword(entId, posteId, posteName) {
    const newPwd = prompt(`Nouveau mot de passe pour "${posteName}" (laisser vide = supprimer):`);
    if (newPwd === null) return;
    const hashStr = s => { let h=0; for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0; return 'h'+Math.abs(h).toString(16); };

    const e = this._enterprises.find(x => x.id === entId);
    const postes = Array.isArray(e.config?.postes) ? [...e.config.postes] :
      e.config?.postes ? Object.values(e.config.postes).filter(Boolean) : [];

    const idx = postes.findIndex(p => p.id === posteId);
    if (idx < 0) return;
    postes[idx] = { ...postes[idx], passwordHash: newPwd ? hashStr(newPwd) : '' };
    delete postes[idx].password;

    await getDB().ref(`entreprises/${entId}/config/postes`).set(postes);
    closeModal();
    showToast(newPwd ? `✅ Mot de passe de "${posteName}" réinitialisé` : `✅ Mot de passe supprimé`, 'success');
    await this.loadData();
  },

  async deleteEnterprise(entId) {
    if (!confirm(`Supprimer définitivement l'entreprise "${entId}" ? Cette action est irréversible.`)) return;
    await getDB().ref(`entreprises/${entId}`).remove();
    showToast('🗑️ Entreprise supprimée', 'success');
    await this.loadData();
    this.renderEnterprises();
  },

  async exportEnterprise(entId) {
    try {
      const snap = await getDB().ref(`entreprises/${entId}`).once('value');
      const data = snap.val();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `export_${entId}_${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    } catch(e) { alert('Erreur export: ' + e.message); }
  },

  showCreateEnterprise() {
    showModal(`
      <h3 style="font-weight:700;margin-bottom:1rem;">🏢 Créer une entreprise</h3>
      <div style="display:flex;flex-direction:column;gap:.625rem;margin-bottom:1rem;">
        <div><label style="font-size:.6875rem;color:#94a3b8;display:block;margin-bottom:.25rem;">ID (unique)</label><input id="new-id" type="text" placeholder="monentreprise_mg" class="field"></div>
        <div><label style="font-size:.6875rem;color:#94a3b8;display:block;margin-bottom:.25rem;">Nom</label><input id="new-name" type="text" placeholder="Mon Entreprise" class="field"></div>
        <div><label style="font-size:.6875rem;color:#94a3b8;display:block;margin-bottom:.25rem;">Mot de passe admin</label><input id="new-pwd" type="password" placeholder="Min 4 chars" class="field"></div>
        <div><label style="font-size:.6875rem;color:#94a3b8;display:block;margin-bottom:.25rem;">Plan</label>
          <select id="new-plan" class="field">
            <option value="BASIC">Basic — 10 000 Ar/30j</option>
            <option value="PREMIUM">Premium — 30 000 Ar/30j</option>
            <option value="LOCAL">Local — 70 000 Ar (perpétuel)</option>
          </select></div>
      </div>
      <div id="new-err" style="display:none;color:#f87171;font-size:.8rem;margin-bottom:.5rem;"></div>
      <div style="display:flex;gap:.5rem;">
        <button onclick="closeModal()" class="btn btn-sm" style="flex:1;background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;">Annuler</button>
        <button onclick="ADMIN.createEnterprise()" class="btn btn-primary btn-sm" style="flex:2;">Créer</button>
      </div>
    `);
  },

  async createEnterprise() {
    const id   = document.getElementById('new-id').value.trim().toLowerCase();
    const name = document.getElementById('new-name').value.trim();
    const pwd  = document.getElementById('new-pwd').value;
    const plan = document.getElementById('new-plan').value;
    const errEl = document.getElementById('new-err');

    if (!id || !/^[a-z0-9_]{3,20}$/.test(id)) { errEl.textContent='ID invalide'; errEl.style.display='block'; return; }
    if (!name) { errEl.textContent='Nom requis'; errEl.style.display='block'; return; }
    if (!pwd || pwd.length < 4) { errEl.textContent='Mot de passe min 4 chars'; errEl.style.display='block'; return; }

    const hashStr = s => { let h=0; for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0; return 'h'+Math.abs(h).toString(16); };
    const now = new Date();
    const trialEnd = new Date(now.getTime() + 7 * 86400000);

    await getDB().ref(`entreprises/${id}`).set({
      config: { id, name, passwordHash: hashStr(pwd), currency:'Ar', multiposte:false, postes:[], createdAt:now.toISOString() },
      subscription: { plan, trialEnd:trialEnd.toISOString(), expiresAt:plan==='LOCAL'?null:trialEnd.toISOString(), status:'trial', createdAt:now.toISOString() }
    });
    closeModal();
    showToast(`✅ Entreprise "${id}" créée`, 'success');
    await this.loadData();
    this.renderEnterprises();
  },

  // ─── Demandes de réabonnement ───────────────────────────────────────────────
  renderRequests(filter = 'all') {
    const reqs = (this._requests || []).filter(r => filter === 'all' || r.status === filter);

    document.getElementById('admin-content').innerHTML = `
      <div style="display:flex;gap:.375rem;margin-bottom:1rem;flex-wrap:wrap;">
        ${[['all','Toutes'],['pending','En attente'],['approved','Approuvées'],['rejected','Refusées']].map(([v,l]) => `
          <button class="btn btn-sm ${filter===v?'btn-primary':''}" style="${filter!==v?'background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;':''}"
            onclick="ADMIN.renderRequests('${v}')">${l} (${this._requests.filter(r=>v==='all'||r.status===v).length})</button>`).join('')}
        <button class="btn btn-sm" style="background:rgba(51,65,85,.5);border:1px solid #334155;color:#94a3b8;margin-left:auto;" onclick="ADMIN.loadData().then(()=>ADMIN.renderRequests('${filter}'))">↻</button>
      </div>
      <div style="background:#1e293b;border:1px solid #334155;border-radius:.875rem;overflow:hidden;">
        <table>
          <thead><tr>
            <th>Entreprise</th><th>Plan demandé</th><th>Paiement</th><th>Montant</th><th>Date</th><th>Statut</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${reqs.map(r => `
              <tr>
                <td>
                  <div style="font-weight:700;font-size:.8125rem;">${esc(r.enterpriseName||r.enterpriseId)}</div>
                  <div style="color:#64748b;font-size:.6875rem;">${esc(r.enterpriseId)}</div>
                </td>
                <td><span class="badge badge-blue">${r.plan}</span></td>
                <td style="font-size:.75rem;">
                  <div>${esc(r.operator)}</div>
                  <div style="color:#64748b;">${esc(r.phone)}</div>
                  <div style="color:#94a3b8;font-family:monospace;font-size:.625rem;">${esc(r.reference)}</div>
                </td>
                <td style="font-weight:700;color:#a5b4fc;">${fCur(r.amount)}</td>
                <td style="font-size:.75rem;color:#64748b;">${fDate(r.submittedAt)}</td>
                <td><span class="badge ${r.status==='pending'?'badge-yellow':r.status==='approved'?'badge-green':'badge-red'}">
                  ${r.status==='pending'?'⏳ En attente':r.status==='approved'?'✅ Approuvé':'❌ Refusé'}
                </span></td>
                <td>
                  ${r.status === 'pending' ? `
                    <div style="display:flex;gap:.25rem;">
                      <button class="btn btn-sm btn-success" onclick="ADMIN.approveRequest('${r.key}','${esc(r.enterpriseId)}','${r.plan}')">✅ Approuver</button>
                      <button class="btn btn-sm btn-danger" onclick="ADMIN.rejectRequest('${r.key}')">❌ Refuser</button>
                    </div>` : `<span style="color:#64748b;font-size:.75rem;">${fDate(r.processedAt||'')}</span>`}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
        ${reqs.length===0?'<div style="padding:2rem;text-align:center;color:#64748b;">Aucune demande dans cette catégorie</div>':''}
      </div>`;
  },

  async approveRequest(reqKey, entId, plan) {
    const note = prompt('Note pour le client (optionnel):') || '';

    const db = getDB();
    const e = this._enterprises.find(x => x.id === entId);
    const sub = e?.subscription || {};
    const curExp = sub.paidUntil || sub.expiresAt;

    // Calculer nouvelle expiration
    const base = curExp && new Date(curExp) > new Date() ? new Date(curExp) : new Date();
    base.setDate(base.getDate() + 30);
    const newExp = base.toISOString();

    // Mettre à jour subscription de l'entreprise
    await db.ref(`entreprises/${entId}/subscription`).update({
      plan, paidUntil: newExp, expiresAt: newExp, status: 'active'
    });

    // Marquer la demande comme approuvée
    await db.ref(`payment_requests/${reqKey}`).update({
      status: 'approved',
      processedAt: new Date().toISOString(),
      adminNote: note,
      newExpiry: newExp
    });

    showToast(`✅ Abonnement approuvé jusqu'au ${fDate(newExp)}`, 'success');
    await this.loadData();
    this.renderRequests();
  },

  async rejectRequest(reqKey) {
    const reason = prompt('Raison du refus :') || 'Paiement non vérifié';
    await getDB().ref(`payment_requests/${reqKey}`).update({
      status: 'rejected',
      processedAt: new Date().toISOString(),
      adminNote: reason
    });
    showToast('Demande refusée', 'warning');
    await this.loadData();
    this.renderRequests();
  },

  // ─── Revenus ─────────────────────────────────────────────────────────────────
  renderRevenue() {
    const reqs = (this._requests||[]).filter(r => r.status === 'approved');
    const total = reqs.reduce((s,r) => s + (r.amount||0), 0);
    const byMonth = {};
    reqs.forEach(r => {
      const month = (r.processedAt||r.submittedAt||'').substr(0,7);
      if (!month) return;
      byMonth[month] = (byMonth[month]||0) + (r.amount||0);
    });
    const sortedMonths = Object.keys(byMonth).sort().reverse().slice(0,12);

    document.getElementById('admin-content').innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;margin-bottom:1.5rem;">
        <div style="background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:.875rem;">
          <div style="font-size:1.375rem;margin-bottom:.375rem;">💰</div>
          <div style="font-size:1.5rem;font-weight:800;color:#4ade80;">${fCur(total)}</div>
          <div style="font-size:.6875rem;color:#64748b;">Revenus totaux</div>
        </div>
        <div style="background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:.875rem;">
          <div style="font-size:1.375rem;margin-bottom:.375rem;">📋</div>
          <div style="font-size:1.5rem;font-weight:800;color:#a5b4fc;">${reqs.length}</div>
          <div style="font-size:.6875rem;color:#64748b;">Paiements reçus</div>
        </div>
        <div style="background:#1e293b;border:1px solid #334155;border-radius:.75rem;padding:.875rem;">
          <div style="font-size:1.375rem;margin-bottom:.375rem;">📅</div>
          <div style="font-size:1.5rem;font-weight:800;color:#fbbf24;">${fCur(byMonth[Object.keys(byMonth).sort().reverse()[0]]||0)}</div>
          <div style="font-size:.6875rem;color:#64748b;">Ce mois</div>
        </div>
      </div>
      <div style="background:#1e293b;border:1px solid #334155;border-radius:.875rem;overflow:hidden;">
        <div style="padding:.75rem 1rem;border-bottom:1px solid #334155;font-size:.875rem;font-weight:700;">Par mois</div>
        <table>
          <thead><tr><th>Mois</th><th>Montant</th><th>Nb paiements</th></tr></thead>
          <tbody>
            ${sortedMonths.map(m => `
              <tr>
                <td style="font-weight:600;">${m}</td>
                <td style="color:#4ade80;font-weight:700;">${fCur(byMonth[m])}</td>
                <td>${reqs.filter(r=>(r.processedAt||r.submittedAt||'').startsWith(m)).length}</td>
              </tr>`).join('')}
          </tbody>
        </table>
        ${sortedMonths.length===0?'<div style="padding:2rem;text-align:center;color:#64748b;">Aucun revenu enregistré</div>':''}
      </div>`;
  },

  // ─── Polling notifications ───────────────────────────────────────────────────
  pollRequests() {
    setInterval(async () => {
      try {
        const snap = await getDB().ref('payment_requests').orderByChild('status').equalTo('pending').once('value');
        let n = 0; snap.forEach(() => n++);
        const el = document.getElementById('notif-count');
        if (el) { el.textContent = n||''; el.style.display = n>0?'inline-flex':'none'; }
      } catch(e) {}
    }, 60000); // toutes les 60s
  }
};

function showToast(msg, type='info') {
  const t = document.createElement('div');
  const colors = { success:'#4ade80', error:'#f87171', warning:'#fbbf24', info:'#a5b4fc' };
  t.style.cssText = `position:fixed;top:1rem;right:1rem;background:#1e293b;border:1px solid ${colors[type]||colors.info};color:${colors[type]||colors.info};padding:.625rem 1rem;border-radius:.625rem;font-size:.8125rem;z-index:9999;box-shadow:0 8px 20px rgba(0,0,0,.4);animation:slideIn .2s ease;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
</script>
<style>@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}</style>
</body>
</html>
